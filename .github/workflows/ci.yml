name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  NODE_VERSION: "20"
  APP_NAME: "crone-ticker-v2"

jobs:
  #--------- JOB 2 TEST -------------

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{env.NODE_VERSION}}
          cache: 'npm'
      - run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage
      - name: Upload/Download coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{github.sha}}
          path: coverage/
          retention-days: 3

  #--------- JOB 3 BUILD -------------

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{env.NODE_VERSION}}
          cache: 'npm'
      - run: npm ci
      - run: npm run build

