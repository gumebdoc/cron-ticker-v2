name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  NODE_VERSION: "20"

jobs:
  #--------- JOB BUILD -------------

    test:
      name: Test multiple Node versions ${{matrix.node-version}}
      runs-on: ubuntu-latest

      strategy:
        matrix:
          node-verion: [18, 20, 22]
        fail-fast: false

      steps:
        - uses: actions/checkout@v4
        - name: Setup Node ${{matrix.node-version}}
          uses: actions/setup-node@v4
          with:
            node-versions: ${{matrix.node-version}} 
            cache: 'npm'
        - run: npm ci
        - run: npm run test
